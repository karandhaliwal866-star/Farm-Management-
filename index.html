<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA - Farm Waste Collector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --danger: #ff4b2b;
            --dark: #121212;
            --gray: #1e1e1e;
        }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Video Feed Section */
        .camera-container {
            width: 90%;
            max-width: 600px;
            margin: 20px 0;
            border: 3px solid var(--gray);
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }

        .camera-feed {
            width: 100%;
            display: block;
            min-height: 200px;
        }

        /* Control Pad Layout */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            width: 85px;
            height: 85px;
            border: none;
            border-radius: 15px;
            background-color: var(--gray);
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px #000;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active {
            box-shadow: 0 2px #000;
            transform: translateY(3px);
            background-color: var(--primary);
        }

        .btn-stop {
            background-color: var(--danger);
            grid-column: 2;
        }

        /* Automation Section */
        .automation-panel {
            background: var(--gray);
            padding: 20px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 50px;
        }

        .auto-btn {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .rec { background: #ffcc00; color: black; }
        .play { background: #00ff88; color: black; }
        .recording { animation: blink 1s infinite; }

        @keyframes blink {
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0;">NOVA BRAIN v1.0</h1>
        <small>Connected to Moga Farm Robot</small>
    </div>

    <div class="camera-container">
        <img src="/video_feed" class="camera-feed" alt="Nova Vision Feed">
    </div>

    <div class="controls-grid">
        <div></div>
        <button class="btn" onmousedown="send('forward')" onmouseup="send('stop')" ontouchstart="send('forward')" ontouchend="send('stop')">▲</button>
        <div></div>

        <button class="btn" onmousedown="send('left')" onmouseup="send('stop')" ontouchstart="send('left')" ontouchend="send('stop')">◀</button>
        <button class="btn btn-stop" onclick="send('stop')">⏹</button>
        <button class="btn" onmousedown="send('right')" onmouseup="send('stop')" ontouchstart="send('right')" ontouchend="send('stop')">▶</button>

        <div></div>
        <button class="btn" onmousedown="send('backward')" onmouseup="send('stop')" ontouchstart="send('backward')" ontouchend="send('stop')">▼</button>
        <div></div>
    </div>

    <div class="automation-panel">
        <button id="recBtn" class="auto-btn rec" onclick="toggleRecord()">● Record Path</button>
        <button class="auto-btn play" onclick="playPath()">▶ Repeat Path</button>
    </div>

    <script>
        const socket = io();
        let isRecording = false;

        function send(dir) {
            socket.emit('move', {direction: dir});
        }

        function toggleRecord() {
            isRecording = !isRecording;
            const btn = document.getElementById('recBtn');
            if(isRecording) {
                btn.innerHTML = "■ Stop Recording";
                btn.classList.add('recording');
                socket.emit('automation', {action: 'start_record'});
            } else {
                btn.innerHTML = "● Record Path";
                btn.classList.remove('recording');
                socket.emit('automation', {action: 'stop_record'});
            }
        }

        function playPath() {
            socket.emit('automation', {action: 'play_path'});
        }
    </script>
</body>
            </html>
